
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tiers - Sélection compte</title>
<link rel="icon" href="data:,">
<style>
body{
  font-family:"Segoe UI", Arial, sans-serif;
  background:#f5f6f8;
  padding:40px;
  color:#1f2a44;
}
.box{
  background:#fff;
  border:1px solid #d9dde5;
  border-radius:10px;
  max-width:1200px;
  padding:24px;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
}
h2{
  margin:0 0 20px;
  color:#003366;
}
.selection-layout{
  display:grid;
  grid-template-columns: minmax(360px, 430px) minmax(420px, 1fr);
  gap:18px;
  align-items:start;
  margin-top:18px;
}
.controls{
  display:grid;
  grid-template-columns: 210px minmax(0, 1fr);
  gap:14px;
  align-items:end;
}
.field label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
  color:#003366;
}
.field.full{
  grid-column:1 / -1;
}
select,input{
  width:100%;
  padding:10px 12px;
  border:1px solid #cfd6e4;
  border-radius:8px;
  font:inherit;
  background:#fff;
}
select:disabled{
  background:#f2f4f8;
  color:#666;
}
.status{
  margin:10px 0 18px;
  font-weight:600;
}
.ok{ color:#0b6b2e; }
.err{ color:#b00020; }
.info{ color:#003366; }
.subtle{
  font-size:13px;
  color:#5b6575;
  margin-top:4px;
}
.card{
  background:#f7f8fb;
  border:1px solid #e2e6ef;
  border-radius:8px;
  padding:14px;
  margin-top:18px;
}
.selection-layout .card{
  margin-top:0;
  height:100%;
}
.card h3{
  margin:0 0 10px;
  color:#003366;
  font-size:16px;
}
table{
  width:100%;
  border-collapse:collapse;
}
th{
  text-align:left;
  width:220px;
  background:#eef2fa;
  padding:8px 10px;
  border:1px solid #e2e6ef;
}
td{
  padding:8px 10px;
  border:1px solid #e2e6ef;
  background:#fff;
}
.hidden{ display:none; }
@media (max-width: 900px){
  .selection-layout{
    grid-template-columns: 1fr;
  }
  .controls{
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
<div class="box">
  <h2>Sélection d’un compte client ou fournisseur</h2>

  <div id="status" class="status info">Chargement...</div>

  <div class="card">
    <h3>Dossier courant</h3>
    <table id="dossierTable"></table>
  </div>

  <div class="selection-layout">
    <div class="card">

      <div class="controls">
        <div class="field">
          <label for="accountType">Type de compte</label>
          <select id="accountType" disabled>
            <option value="">Choisir...</option>
            <option value="clients">Client</option>
            <option value="fournisseurs">Fournisseur</option>
          </select>
        </div>
      </div>

      <div class="controls">
        <div class="field full">
          <label for="searchInput">Recherche</label>
          <input id="searchInput" placeholder="Rechercher un compte..." disabled>
        </div>

        <div class="field full">
          <label for="accountSelect">Compte</label>
          <select id="accountSelect" disabled>
            <option value="">Sélectionner un compte...</option>
          </select>
          <div class="subtle" id="listInfo"></div>
        </div>
      </div>

    </div>

    <div class="card hidden" id="accountCard">
      <h3>Compte sélectionné</h3>
      <table id="accountTable"></table>
    </div>
  </div>
</div>

<script>
(function(){

function normalize(u){
  return (u || "").replace(/\/+$/, "");
}

function addRow(table,label,value){
  if(value === undefined || value === null || String(value).trim() === "") return;
  var tr=document.createElement("tr");
  var th=document.createElement("th");
  var td=document.createElement("td");
  th.textContent=label;
  td.textContent=value;
  tr.appendChild(th);
  tr.appendChild(td);
  table.appendChild(tr);
}

function setStatus(message,css){
  var el=document.getElementById("status");
  el.textContent=message;
  el.className="status "+css;
}

var params=new URLSearchParams(window.location.search);
var cnx=params.get("CNX")||params.get("cnx")||"";
var uuid=params.get("UUID")||params.get("uuid")||"";
var referrer=document.referrer;
var apiUrl=null;

var accountCache={clients:[],fournisseurs:[]};
var filteredList=[];

var accountType=document.getElementById("accountType");
var accountSelect=document.getElementById("accountSelect");
var searchInput=document.getElementById("searchInput");
var accountTable=document.getElementById("accountTable");
var accountCard=document.getElementById("accountCard");
var dossierTable=document.getElementById("dossierTable");
var listInfo=document.getElementById("listInfo");

if(referrer && cnx){
  try{
    var r=new URL(referrer);
    apiUrl=normalize(r.origin+"/"+cnx+"/api");
  }catch(e){}
}

if(!apiUrl || !uuid){
  setStatus("Paramètres CNX ou UUID manquants","err");
  return;
}

function apiGet(path){
  return fetch(apiUrl+path,{
    method:"GET",
    headers:{
      "accept":"text/plain",
      "UUID":uuid
    }
  }).then(function(r){
    return r.text().then(function(t){
      if(!r.ok) throw new Error("Erreur HTTP "+r.status);
      return t;
    });
  });
}

function renderDossier(data){
  dossierTable.innerHTML="";
  addRow(dossierTable,"Nom",data.Nom);
  addRow(dossierTable,"Prénom",data.Prenom);
  addRow(dossierTable,"Adresse ligne 1",data.Adresse1);
  addRow(dossierTable,"Adresse ligne 2",data.Adresse2);
  addRow(dossierTable,"Code postal",data.CodePostal);
  addRow(dossierTable,"Ville",data.Ville);
  addRow(dossierTable,"Siret",data.SIRET);
}

function renderAccount(account){

  accountTable.innerHTML="";
  var tiers=account && account.Tiers ? account.Tiers : {};
  var raisonSociale=tiers.RaisonSociale;

  addRow(accountTable,"Code",account ? account.Code : "");

  if(!raisonSociale || String(raisonSociale).trim()===""){
    addRow(accountTable,"Libellé",account ? account.Lib : "");
  }

  addRow(accountTable,"Raison sociale",raisonSociale);
  addRow(accountTable,"SIREN",tiers.Siren);
  addRow(accountTable,"TVA intracom",tiers.NumeroIntracom);
  addRow(accountTable,"Email",tiers.Email);
  addRow(accountTable,"Téléphone",tiers.Telephone);

  accountCard.classList.remove("hidden");
}

function buildAccountOptions(type){

  var items=accountCache[type]||[];

  filteredList=items.map(function(item,index){

    var tiers=item.Tiers||{};
    var displayName=tiers.RaisonSociale && tiers.RaisonSociale.trim()!==""
      ? tiers.RaisonSociale
      : item.Lib;

    return{
      index:index,
      code:item.Code,
      name:displayName||"",
      label:item.Code+" — "+(displayName||"")
    };

  });

  filteredList.sort(function(a,b){
    return a.name.localeCompare(b.name,"fr",{sensitivity:"base"});
  });

  populateSelect(filteredList);

  searchInput.disabled=false;
}

function populateSelect(list){

  accountSelect.innerHTML='<option value="">Sélectionner un compte...</option>';

  list.forEach(function(item){
    var option=document.createElement("option");
    option.value=item.index;
    option.textContent=item.label;
    accountSelect.appendChild(option);
  });

  accountSelect.disabled=list.length===0;

  listInfo.textContent=list.length
    ? list.length+" compte(s) disponible(s)"
    : "Aucun compte disponible";

  accountCard.classList.add("hidden");
  accountTable.innerHTML="";
}

function loadAccounts(type){

  var path=type==="clients"
    ? "/v1/compta/comptes/clients"
    : "/v1/compta/comptes/fournisseurs";

  setStatus("Chargement de la liste des comptes...","info");

  apiGet(path)
    .then(function(text){

      var data=JSON.parse(text);

      if(!Array.isArray(data))
        throw new Error("Réponse inattendue");

      accountCache[type]=data;

      buildAccountOptions(type);

      setStatus("Connexion SSO valide","ok");

    })
    .catch(function(err){
      setStatus(err.message,"err");
    });
}

accountType.addEventListener("change",function(){

  var type=accountType.value;

  if(!type){
    accountSelect.disabled=true;
    searchInput.disabled=true;
    return;
  }

  loadAccounts(type);

});

accountSelect.addEventListener("change",function(){

  var type=accountType.value;
  var idx=accountSelect.value;

  if(type==="" || idx===""){
    accountCard.classList.add("hidden");
    return;
  }

  renderAccount(accountCache[type][Number(idx)]);

});

searchInput.addEventListener("input",function(){

  var q=searchInput.value.toLowerCase();

  var list=filteredList.filter(function(item){
    return item.label.toLowerCase().includes(q);
  });

  populateSelect(list);

});

setStatus("Chargement du dossier courant...","info");

apiGet("/v1/sessions/dossier")
  .then(function(text){

    var dossier=JSON.parse(text);

    renderDossier(dossier);

    accountType.disabled=false;

    setStatus("Connexion SSO valide","ok");

  })
  .catch(function(err){
    setStatus(err.message,"err");
  });

})();
</script>
</body>
</html>
