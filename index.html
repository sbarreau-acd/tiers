<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tiers - Recherche comptes</title>
<link rel="icon" href="data:,">
<style>
body{font-family:"Segoe UI",Arial,sans-serif;background:#f5f6f8;padding:40px;color:#1f2a44}
.box{background:#fff;border:1px solid #d9dde5;border-radius:10px;max-width:1200px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.04)}
h2{margin:0 0 20px;color:#003366}
.selection-layout{display:grid;grid-template-columns:minmax(420px,520px) minmax(420px,1fr);gap:18px;align-items:start;margin-top:18px}
.field label{display:block;font-weight:600;margin-bottom:6px;color:#003366}
input{width:100%;padding:10px 12px;border:1px solid #cfd6e4;border-radius:8px;font:inherit;background:#fff;box-sizing:border-box}
input:disabled{background:#f2f4f8;color:#666}
.status{margin:10px 0 18px;font-weight:600}
.ok{color:#0b6b2e}.err{color:#b00020}.info{color:#003366}
.subtle{font-size:13px;color:#5b6575;margin-top:4px}
.card{background:#f7f8fb;border:1px solid #e2e6ef;border-radius:8px;padding:14px;margin-top:18px}
.selection-layout .card{margin-top:0;height:100%}
.card h3{margin:0 0 10px;color:#003366;font-size:16px}
table{width:100%;border-collapse:collapse}
th{text-align:left;width:220px;background:#eef2fa;padding:8px 10px;border:1px solid #e2e6ef}
td{padding:8px 10px;border:1px solid #e2e6ef;background:#fff}
.hidden{display:none}

.autocomplete-wrap{position:relative}
.autocomplete-list{position:absolute;top:100%;left:0;right:0;z-index:20;margin-top:6px;background:#fff;border:1px solid #cfd6e4;border-radius:8px;box-shadow:0 8px 20px rgba(0,0,0,.08);max-height:360px;overflow-y:auto}
.autocomplete-item{padding:10px 12px;border-bottom:1px solid #eef2fa;cursor:pointer}
.autocomplete-item:hover{background:#eef4ff}
.item-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.item-name{color:#1f2a44}
.badge{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:700;min-width:92px;box-sizing:border-box}
.badge-client{background:#e6f4ea;color:#0b6b2e;border:1px solid #0b6b2e}
.badge-fournisseur{background:#eaf2ff;color:#0b4ea2;border:1px solid #0b4ea2}
.row-client .item-name{color:#0b6b2e}
.row-fournisseur .item-name{color:#0b4ea2}
.selected-pill{display:inline-flex;align-items:center;gap:8px;margin-top:10px;padding:8px 10px;background:#eef4ff;border:1px solid #cfe0ff;border-radius:999px;color:#003366;font-size:13px;font-weight:600;flex-wrap:wrap}
.clear-btn{border:0;background:#003366;color:#fff;border-radius:999px;padding:2px 8px;cursor:pointer;font-size:12px}

@media (max-width:900px){
.selection-layout{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="box">
<h2>Sélection d’un compte client ou fournisseur</h2>

<div id="status" class="status info">Chargement...</div>

<div class="card">
<h3>Dossier courant</h3>
<table id="dossierTable"></table>
</div>

<div class="selection-layout">
<div class="card">
<div class="field autocomplete-wrap">
<label for="searchInput">Compte</label>
<input id="searchInput" placeholder="Rechercher un client ou un fournisseur..." autocomplete="off" disabled>
<div id="autocompleteList" class="autocomplete-list hidden"></div>
<div class="subtle" id="listInfo"></div>

<div id="selectedPill" class="selected-pill hidden">
<span id="selectedText"></span>
<button id="clearSelection" class="clear-btn" type="button">Effacer</button>
</div>
</div>
</div>

<div class="card hidden" id="accountCard">
<h3>Compte sélectionné</h3>
<table id="accountTable"></table>
</div>

</div>
</div>

<script>
(function(){

function escapeHtml(s){
  return String(s==null ? "" : s).replace(/[&<>"]/g,function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];
  });
}

function addRow(table,label,value){
  if(value===undefined || value===null || String(value).trim()==="") return;
  var tr=document.createElement("tr");
  var th=document.createElement("th");
  var td=document.createElement("td");
  th.textContent=label;
  td.textContent=value;
  tr.appendChild(th);
  tr.appendChild(td);
  table.appendChild(tr);
}

function setStatus(m,c){
  var el=document.getElementById("status");
  el.textContent=m;
  el.className="status "+c;
}

function hideList(){
  document.getElementById("autocompleteList").classList.add("hidden");
}

var params=new URLSearchParams(window.location.search);
var cnx=params.get("CNX")||params.get("cnx")||"";
var uuid=params.get("UUID")||params.get("uuid")||"";
var referrer=document.referrer;
var apiUrl=null;

if(referrer&&cnx){
  try{
    var r=new URL(referrer);
    apiUrl=r.origin+"/"+cnx+"/api";
  }catch(e){}
}

if(!apiUrl||!uuid){
  setStatus("Paramètres CNX ou UUID manquants","err");
  return;
}

function apiGet(path){
  return fetch(apiUrl+path,{method:"GET",headers:{accept:"text/plain","UUID":uuid}})
    .then(function(r){
      return r.text().then(function(t){
        if(!r.ok) throw new Error("Erreur HTTP "+r.status);
        return t;
      });
    });
}

var allAccounts=[];
var matches=[];
var selectedAccount=null;
var dossierTable=document.getElementById("dossierTable");
var searchInput=document.getElementById("searchInput");
var list=document.getElementById("autocompleteList");
var accountCard=document.getElementById("accountCard");
var accountTable=document.getElementById("accountTable");
var selectedText=document.getElementById("selectedText");
var selectedPill=document.getElementById("selectedPill");
var clearSelection=document.getElementById("clearSelection");
var listInfo=document.getElementById("listInfo");

function renderDossier(d){
  dossierTable.innerHTML="";
  addRow(dossierTable,"Nom",d.Nom);
  addRow(dossierTable,"Prénom",d.Prenom);
  addRow(dossierTable,"Adresse ligne 1",d.Adresse1);
  addRow(dossierTable,"Adresse ligne 2",d.Adresse2);
  addRow(dossierTable,"Code postal",d.CodePostal);
  addRow(dossierTable,"Ville",d.Ville);
  addRow(dossierTable,"Siret",d.SIRET);
}

function renderAccount(a){
  accountTable.innerHTML="";
  var t=a.Tiers||{};
  var rs=t.RaisonSociale;
  addRow(accountTable,"Type",a.AccountTypeLabel);
  addRow(accountTable,"Code",a.Code);
  if(!rs) addRow(accountTable,"Libellé",a.Lib);
  addRow(accountTable,"Raison sociale",rs);
  addRow(accountTable,"SIREN",t.Siren);
  addRow(accountTable,"TVA intracom",t.NumeroIntracom);
  addRow(accountTable,"Email",t.Email);
  addRow(accountTable,"Téléphone",t.Telephone);
  accountCard.classList.remove("hidden");
}

function buildUnifiedList(clients,fournisseurs){
  var result=[];

  clients.forEach(function(i){
    var name=i.Tiers&&i.Tiers.RaisonSociale?i.Tiers.RaisonSociale:i.Lib;
    result.push({raw:i,code:i.Code||"",name:name||"",type:"client",typeLabel:"Client"});
  });

  fournisseurs.forEach(function(i){
    var name=i.Tiers&&i.Tiers.RaisonSociale?i.Tiers.RaisonSociale:i.Lib;
    result.push({raw:i,code:i.Code||"",name:name||"",type:"fournisseur",typeLabel:"Fournisseur"});
  });

  result.forEach(function(x){
    x.search=(x.code+" "+x.name+" "+((x.raw&&x.raw.Lib)||"")+" "+x.typeLabel).toLowerCase();
    x.raw.AccountTypeLabel=x.typeLabel;
  });

  result.sort(function(a,b){
    return a.name.localeCompare(b.name,"fr",{sensitivity:"base"});
  });

  allAccounts=result;
  listInfo.textContent=result.length+" compte(s) disponible(s)";
}

function showMatches(arr){
  list.innerHTML="";
  matches=arr.slice(0,60);

  if(!matches.length){ hideList(); return; }

  matches.forEach(function(m,i){
    var row=document.createElement("div");
    row.className="autocomplete-item "+(m.type==="client"?"row-client":"row-fournisseur");
    row.innerHTML=
      '<div class="item-line">'+
      '<span class="badge '+(m.type==="client"?'badge-client':'badge-fournisseur')+'">'+m.typeLabel+'</span>'+
      '<span class="item-name">'+escapeHtml(m.name)+'</span>'+
      '</div>';
    row.onmousedown=function(e){e.preventDefault();selectMatch(i);};
    list.appendChild(row);
  });

  list.classList.remove("hidden");
}

function selectMatch(i){
  var m=matches[i];
  selectedAccount=m.raw;
  searchInput.value=m.name;
  selectedText.textContent=m.typeLabel+" — "+m.name;
  selectedPill.classList.remove("hidden");
  hideList();
  renderAccount(m.raw);
}

function refresh(){
  var q=searchInput.value.toLowerCase().trim();

  if(!q){ hideList(); return; }

  var r=allAccounts.filter(function(x){ return x.search.includes(q); });

  if(r.length===1){
    matches=[r[0]];
    selectMatch(0);
    return;
  }

  showMatches(r);
}

function clearSelected(){
  selectedAccount=null;
  searchInput.value="";
  selectedText.textContent="";
  selectedPill.classList.add("hidden");
  accountCard.classList.add("hidden");
  accountTable.innerHTML="";
  hideList();
}

function loadAccounts(){
  setStatus("Chargement des comptes clients et fournisseurs...","info");

  Promise.all([
    apiGet("/v1/compta/comptes/clients"),
    apiGet("/v1/compta/comptes/fournisseurs")
  ]).then(function(res){

    var clients=JSON.parse(res[0]);
    var fournisseurs=JSON.parse(res[1]);

    buildUnifiedList(clients,fournisseurs);
    searchInput.disabled=false;

    setStatus("Connexion SSO valide","ok");

  }).catch(function(e){
    setStatus(e.message,"err");
  });
}

searchInput.addEventListener("input",function(){
  selectedAccount=null;
  selectedPill.classList.add("hidden");
  selectedText.textContent="";
  accountCard.classList.add("hidden");
  accountTable.innerHTML="";
  refresh();
});

clearSelection.addEventListener("click",function(e){
  e.preventDefault();
  clearSelected();
  searchInput.focus();
});

document.addEventListener("click",function(e){
  if(!e.target.closest(".autocomplete-wrap")){
    hideList();
  }
});

setStatus("Chargement du dossier courant...","info");

apiGet("/v1/sessions/dossier")
.then(function(t){
  renderDossier(JSON.parse(t));
  return loadAccounts();
})
.catch(function(e){
  setStatus(e.message,"err");
});

})();
</script>
</body>
</html>
